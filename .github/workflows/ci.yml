name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-check:
    # Keep CI aligned with the production build environment.
    # The blog content pipeline currently relies on Windows behavior and
    # Linux runners can report false negatives during Astro type checking.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize line endings for checks
        shell: pwsh
        run: |
          git config --local core.autocrlf false
          git config --local core.eol lf

          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          $textExtensions = @(
            ".astro",
            ".css",
            ".js",
            ".json",
            ".jsx",
            ".md",
            ".mdx",
            ".scss",
            ".ts",
            ".tsx"
          )

          Get-ChildItem -Path src -Recurse -File | Where-Object {
            $textExtensions -contains $_.Extension.ToLowerInvariant()
          } | ForEach-Object {
            $content = [System.IO.File]::ReadAllText($_.FullName)
            $normalized = $content.Replace("`r`n", "`n").Replace("`r", "`n")

            if ($normalized -ne $content) {
              [System.IO.File]::WriteAllText($_.FullName, $normalized, $utf8NoBom)
            }
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro typecheck
        run: pnpm astro-check

      - name: Biome check (lint + formatting) on src
        shell: pwsh
        run: |
          $attempts = 2
          $exitCode = 0

          for ($i = 1; $i -le $attempts; $i++) {
            Write-Host "Biome lint attempt $i/$attempts"
            pnpm biome:check
            $exitCode = $LASTEXITCODE

            if ($exitCode -eq 0) {
              exit 0
            }

            if ($i -lt $attempts) {
              Write-Warning "Biome lint failed with exit code $exitCode. Retrying in 5 seconds..."
              Start-Sleep -Seconds 5
            }
          }

          exit $exitCode

      - name: Biome formatting check on src
        shell: pwsh
        run: |
          $attempts = 2
          $exitCode = 0

          for ($i = 1; $i -le $attempts; $i++) {
            Write-Host "Biome format attempt $i/$attempts"
            pnpm biome:format:check
            $exitCode = $LASTEXITCODE

            if ($exitCode -eq 0) {
              exit 0
            }

            if ($i -lt $attempts) {
              Write-Warning "Biome format check failed with exit code $exitCode. Retrying in 5 seconds..."
              Start-Sleep -Seconds 5
            }
          }

          exit $exitCode
